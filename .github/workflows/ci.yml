name: CI - Testes PHP 

 

on: 

  push: 

    branches: [ main ] 

  pull_request: 

    branches: [ main ] 

 

jobs: 

  test: 

    runs-on: ubuntu-latest 

    steps: 

      - name: Checkout do repositorio 

        uses: actions/checkout@v4 

 

      - name: Configurar PHP 

        uses: shivammathur/setup-php@v2 

        with: 

          php-version: '8.2' 

 

      - name: Executar testes PHP 

        run: php src/test.php 